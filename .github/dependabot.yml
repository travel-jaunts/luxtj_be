version: 2
updates:
  # Maintain Python dependencies (pip, poetry, pipenv)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly" # Weekly is better for production to reduce CI/CD churn
    open-pull-requests-limit: 2
    # Group minor/patch updates to reduce PR noise
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ensure production stable versions
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"] # Ignore major updates to avoid breaking production
    reviewers:
      - "kuunalroychoudhury" # Automatically request reviews from your team

  # Maintain GitHub Actions used in production workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
